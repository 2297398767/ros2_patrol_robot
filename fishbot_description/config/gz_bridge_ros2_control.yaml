# ====== 基础话题 ======
# clock 是必需的, joint_states 现在由 ros2_control 发布，无需桥接
- {gz_topic_name: "/clock", ros_topic_name: "/clock", gz_type_name: "gz.msgs.Clock", ros_type_name: "rosgraph_msgs/msg/Clock", direction: "GZ_TO_ROS"}

# ====== 传感器数据 ======
# 激光雷达
- {gz_topic_name: "/fishbot/scan", ros_topic_name: "/scan", gz_type_name: "gz.msgs.LaserScan", ros_type_name: "sensor_msgs/msg/LaserScan", direction: "GZ_TO_ROS"}
# IMU
- {gz_topic_name: "/fishbot/imu", ros_topic_name: "/imu/data_raw", gz_type_name: "gz.msgs.IMU", ros_type_name: "sensor_msgs/msg/Imu", direction: "GZ_TO_ROS"}
# RGBD 相机图像
- {gz_topic_name: "/fishbot/camera/image", ros_topic_name: "/camera/image_raw", gz_type_name: "gz.msgs.Image", ros_type_name: "sensor_msgs/msg/Image", direction: "GZ_TO_ROS"}